services:
  tradedata-api:
    build: .
    container_name: trade_engine_container
    ports:
      - "8000:8000"
      - "8501:8501"
    volumes:
      - .:/app
  
    command: >
      sh -c "uvicorn src.api:app --host 0.0.0.0 --port 8000 & 
             streamlit run src/dashboard.py --server.port 8501 --server.address 0.0.0.0"